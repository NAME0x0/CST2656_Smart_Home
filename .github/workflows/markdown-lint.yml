name: Lint Markdown

on:
  push:
    branches: [main]
    paths:
      - "**.md"
  pull_request:
    branches: [main]
    paths:
      - "**.md"

permissions:
  contents: read

jobs:
  lint:
    name: Markdownlint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules/**
