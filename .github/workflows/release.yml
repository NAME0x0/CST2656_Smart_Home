name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc & LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra lmodern

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build report (DOCX)
        run: |
          cd 08-final-report
          pandoc report.md \
            -o "CST2565_Smart_Home_Report_${{ steps.version.outputs.tag }}.docx" \
            --from=gfm \
            --to=docx \
            --toc \
            --toc-depth=3 \
            --number-sections \
            --metadata title="Smart Home Consulting Report" \
            --metadata date="$(date +%Y-%m-%d)"

      - name: Build report (PDF)
        continue-on-error: true
        run: |
          cd 08-final-report
          pandoc report.md \
            -o "CST2565_Smart_Home_Report_${{ steps.version.outputs.tag }}.pdf" \
            --from=gfm \
            --to=pdf \
            --toc \
            --toc-depth=3 \
            --number-sections \
            -V geometry:margin=2.5cm \
            -V fontsize=11pt \
            --pdf-engine=pdflatex \
            --metadata title="Smart Home Consulting Report" \
            --metadata date="$(date +%Y-%m-%d)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            08-final-report/CST2565_Smart_Home_Report_${{ steps.version.outputs.tag }}.docx
            08-final-report/CST2565_Smart_Home_Report_${{ steps.version.outputs.tag }}.pdf
          body: |
            ## Smart Home Consulting Report — ${{ steps.version.outputs.tag }}

            This release was automatically generated from the latest `report.md`.

            ### Downloads
            - **DOCX** — Open in Microsoft Word for final formatting review
            - **PDF** — Print-ready version

            ### What changed
            See the auto-generated changelog below.
