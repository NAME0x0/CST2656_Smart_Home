name: Weekly Status Update
description: Individual weekly progress check-in
labels: ["status"]
body:
  - type: dropdown
    id: week
    attributes:
      label: Week Number
      options:
        - "Week 8"
        - "Week 9"
        - "Week 10"
        - "Week 11"
        - "Week 12"
    validations:
      required: true

  - type: dropdown
    id: member
    attributes:
      label: Team Member
      options:
        - "Afsah (@NAME0x0)"
        - "Jake (@JakeSajith)"
        - "Eeshitha (@Eeshitha-afk)"
        - "Syed (@Syed-Nihaal)"
    validations:
      required: true

  - type: textarea
    id: completed
    attributes:
      label: Completed This Week
      placeholder: |
        - [ ] Finished cost table for family home
        - [ ] Updated network diagram
    validations:
      required: true

  - type: textarea
    id: planned
    attributes:
      label: Planned for Next Week
      placeholder: |
        - [ ] Write solar integration section
        - [ ] Review Eeshitha's sheltered accommodation design
    validations:
      required: true

  - type: textarea
    id: blockers
    attributes:
      label: Blockers or Risks
      description: Anything preventing progress or that might cause delays?
      placeholder: "e.g. Waiting on pricing data for Tunstall Communicall Vi"
    validations:
      required: false

  - type: dropdown
    id: confidence
    attributes:
      label: On Track?
      options:
        - "Yes — on schedule"
        - "At risk — may slip without action"
        - "Behind — needs team help"
    validations:
      required: true

  - type: textarea
    id: diary
    attributes:
      label: Reflective Diary Updated?
      description: Confirm you've updated your reflective diary for this week
      placeholder: "Yes / No — if no, explain why"
    validations:
      required: true
